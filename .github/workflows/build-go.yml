name: Build Go Primitives

on:
  push:
    branches: [main]
    paths:
      - 'ttp-primitives/go/**'
      - 'tools/**'
      - '.github/workflows/build-go.yml'
  pull_request:
    paths:
      - 'ttp-primitives/go/**'
      - 'tools/**'
      - '.github/workflows/build-go.yml'

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: linux-go-cgo
            cgo: "1"
            name: Linux (cgo)
          - config: linux-go-static
            cgo: "0"
            name: Linux (pure-Go static)

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - uses: actions/checkout@v7

      # gcc is required by the cgo build; harmless for the static build.
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y golang gcc python3

      - name: Test
        working-directory: ttp-primitives/go
        run: go test ./...

      # The Go axis is selected by CGO_ENABLED, not a toolchain file. Build each
      # primitive straight into the staging bundle.
      - name: Build and stage primitives
        working-directory: ttp-primitives/go
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          for p in empty file_io spawn process_exec process_enumeration thread_create directory_enumeration memory_allocate pipe_ipc tcp_client tcp_server dns_lookup http_client; do
            go build -o ../../dist/${{ matrix.config }}/$p ./$p
          done

      - name: Verify substrate
        run: |
          python3 tools/verify_substrate.py \
            --config ${{ matrix.config }} \
            --json substrate-${{ matrix.config }}.json \
            dist/${{ matrix.config }}

      - name: Upload verified primitives
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.config }}
          path: |
            dist/${{ matrix.config }}
            substrate-${{ matrix.config }}.json

  windows:
    # Same CGO on/off axis as Linux. CGO=1 links the platform C runtime (UCRT,
    # via the runner's MinGW gcc); CGO=0 is pure-Go with no C runtime. The
    # build-tagged cgo anchor in the empty primitive forces the split.
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: windows-go-cgo
            cgo: "1"
            name: Windows (cgo)
          - config: windows-go-static
            cgo: "0"
            name: Windows (pure-Go)

    name: ${{ matrix.name }}
    runs-on: windows-2025
    env:
      CGO_ENABLED: ${{ matrix.cgo }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: ttp-primitives/go/go.mod

      # cgo needs a C compiler; the runner ships MinGW gcc (UCRT) at C:\mingw64.
      # Harmless for the pure-Go build.
      - name: Add MinGW to PATH
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\mingw64\bin"

      - name: Test
        working-directory: ttp-primitives/go
        run: go test ./empty/... ./file_io/... ./spawn/...

      - name: Build and stage primitives
        working-directory: ttp-primitives/go
        run: |
          foreach ($p in "empty","file_io","spawn") {
            go build -o "../../dist/${{ matrix.config }}/$p.exe" "./$p"
          }

      - name: Verify substrate
        run: |
          python tools/verify_substrate.py `
            --config ${{ matrix.config }} `
            --json substrate-${{ matrix.config }}.json `
            dist/${{ matrix.config }}

      - name: Upload verified primitives
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.config }}
          path: |
            dist/${{ matrix.config }}
            substrate-${{ matrix.config }}.json
