name: PROBE Windows Go cgo
on:
  push:
    branches: [probe/windows-go]
  workflow_dispatch:
jobs:
  probe:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build both Go binaries and run pe.py verifier
        shell: pwsh
        run: |
          $env:PATH = "C:\mingw64\bin;$env:PATH"
          New-Item -Type Directory g | Out-Null; Push-Location g
          "module g`ngo 1.24" | Set-Content go.mod
          "package main`nfunc main(){}" | Set-Content main.go
          "//go:build cgo`n`npackage main`n`n/*`n#include <stddef.h>`n*/`nimport `"C`"`n`nvar _ = C.size_t(0)" | Set-Content anchor_cgo.go
          $env:CGO_ENABLED='1'; go build -o cgo.exe .
          $env:CGO_ENABLED='0'; go build -o pure.exe .
          Pop-Location
          Write-Host "=== pe.py facts on each Go binary ==="
          python -c "import sys,json; sys.path.insert(0,'tools'); from substrate import pe; [print(name, json.dumps({k:pe.extract(open(p,'rb').read())[k] for k in ('format','machine','linkage','libc','needed')})) for name,p in (('CGO=1', 'g/cgo.exe'), ('CGO=0','g/pure.exe'))]"
