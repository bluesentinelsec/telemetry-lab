name: PROBE Windows C++ stdlib
on:
  push:
    branches: [probe/windows-cpp]
  workflow_dispatch:
jobs:
  ucrt64:
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-clang mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-libc++ mingw-w64-ucrt-x86_64-binutils
      - name: Test concession snippet (both stdlibs)
        run: |
          cat > conc.cpp <<'CPP'
          #include <string>
          int main(int argc, char**) {
              // argc-dependent size defeats constant-folding and small-string
              // optimization, forcing a real heap allocation through the C++
              // standard library so the stdlib DLL is dynamically imported.
              std::string s(static_cast<std::size_t>(argc) + 64, 'x');
              return static_cast<int>(s.size()) - (argc + 64);
          }
          CPP
          for stdlib in libstdc++ libc++; do
            echo "===== -stdlib=$stdlib"
            clang++ -O2 -stdlib=$stdlib conc.cpp -o c.exe || { echo BUILD FAIL; continue; }
            objdump -p c.exe | grep -iE "libstdc\+\+-6\.dll|libc\+\+\.dll|api-ms-win-crt-runtime" | sed 's/^/  /'
            ./c.exe; echo "  exit=$?"
          done
