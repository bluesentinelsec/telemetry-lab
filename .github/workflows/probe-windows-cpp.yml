name: PROBE Windows C++ stdlib
on:
  push:
    branches: [probe/windows-cpp]
  workflow_dispatch:
jobs:
  ucrt64:
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-clang mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-libc++ mingw-w64-ucrt-x86_64-binutils
      - name: Test simpler concession candidates
        run: |
          cat > c1.cpp <<'CPP'
          #include <string>
          int main(){ std::string s; return 0; }
          CPP
          cat > c2.cpp <<'CPP'
          #include <string>
          int main(){ std::string s = "x"; return 0; }
          CPP
          cat > c3.cpp <<'CPP'
          #include <string>
          std::string g;
          int main(){ return 0; }
          CPP
          cat > c4.cpp <<'CPP'
          #include <string>
          int main(){ std::string s("xxxxxxxxxxxxxxxxxxxxxxxx"); return (int)s.empty(); }
          CPP
          cat > c5.cpp <<'CPP'
          #include <string>
          int main(int argc, char**){ std::string s(argc,'x'); return (int)s.empty(); }
          CPP
          links(){ objdump -p "$1" 2>/dev/null | grep -qiE "libstdc\+\+-6\.dll|libc\+\+\.dll" && echo YES || echo "no"; }
          for c in c1 c2 c3 c4 c5; do
            for stdlib in libstdc++ libc++; do
              if clang++ -O2 -stdlib=$stdlib $c.cpp -o x.exe 2>/dev/null; then
                ./x.exe; rc=$?
                printf '%s  %-10s import=%s exit=%s\n' "$c" "$stdlib" "$(links x.exe)" "$rc"
              else printf '%s  %-10s BUILD FAIL\n' "$c" "$stdlib"; fi
            done
          done
