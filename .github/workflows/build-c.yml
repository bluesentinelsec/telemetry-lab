name: Build C Primitives

on:
  push:
    branches: [main]
    paths:
      - 'ttp-primitives/c/**'
      - 'tools/**'
      - '.github/workflows/build-c.yml'
  pull_request:
    paths:
      - 'ttp-primitives/c/**'
      - 'tools/**'
      - '.github/workflows/build-c.yml'

jobs:
  linux:
    strategy:
      matrix:
        include:
          - toolchain: linux-glibc
            config: linux-c-glibc
            name: Linux (glibc)
            packages: ""
          - toolchain: linux-musl
            config: linux-c-musl
            name: Linux (musl)
            packages: musl-tools

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake git python3 ${{ matrix.packages }}

      - name: Configure (CMake)
        working-directory: ttp-primitives/c
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=toolchains/${{ matrix.toolchain }}.cmake

      - name: Build
        working-directory: ttp-primitives/c
        run: cmake --build build

      - name: Test
        working-directory: ttp-primitives/c/build
        run: ctest --output-on-failure

      # Stage the primitives on their own. The Catch2 harness is deliberately
      # not installed: it links the default glibc toolchain even in the musl
      # config, so it is not part of the substrate under measurement.
      - name: Stage primitives
        working-directory: ttp-primitives/c
        run: cmake --install build --prefix ../../dist/${{ matrix.config }}

      # Prove the artifacts actually have the runtime this config claims,
      # rather than trusting that the toolchain file took effect.
      - name: Verify substrate
        run: |
          python3 tools/verify_substrate.py \
            --config ${{ matrix.config }} \
            --json substrate-${{ matrix.config }}.json \
            dist/${{ matrix.config }}

      - name: Upload verified primitives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}
          path: |
            dist/${{ matrix.config }}
            substrate-${{ matrix.config }}.json

  windows:
    # The Windows C axis holds the compiler constant (MinGW gcc) and varies only
    # the C runtime library, UCRT vs MSVCRT -- the Windows analogue of the Linux
    # glibc/musl axis. Both configs use gcc from MSYS2; the only difference is
    # the environment: ucrt64 links UCRT, mingw64 links MSVCRT. MSVC is not used,
    # because cl.exe can only target UCRT and would confound compiler with CRT.
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: windows-c-ucrt
            msystem: UCRT64
            prefix: ucrt-x86_64
            name: Windows (UCRT)
          - config: windows-c-msvcrt
            msystem: MINGW64
            prefix: x86_64
            name: Windows (MSVCRT)

    name: ${{ matrix.name }}
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v7

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            git
            mingw-w64-${{ matrix.prefix }}-gcc
            mingw-w64-${{ matrix.prefix }}-cmake
            mingw-w64-${{ matrix.prefix }}-ninja

      - name: Configure, build, test
        working-directory: ttp-primitives/c
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Stage primitives
        working-directory: ttp-primitives/c
        run: cmake --install build --prefix ../../dist/${{ matrix.config }}

      # Verify with the runner's system Python (the PE parser is pure stdlib).
      - name: Verify substrate
        shell: pwsh
        run: |
          python tools/verify_substrate.py `
            --config ${{ matrix.config }} `
            --json substrate-${{ matrix.config }}.json `
            dist/${{ matrix.config }}

      - name: Upload verified primitives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}
          path: |
            dist/${{ matrix.config }}
            substrate-${{ matrix.config }}.json
