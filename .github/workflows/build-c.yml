name: Build C Primitives

on:
  push:
    branches: [main]
    paths:
      - 'ttp-primitives/c/**'
      - '.github/workflows/build-c.yml'
  pull_request:
    paths:
      - 'ttp-primitives/c/**'
      - '.github/workflows/build-c.yml'

jobs:
  linux:
    strategy:
      matrix:
        include:
          - toolchain: linux-glibc
            name: Linux (glibc)
            packages: ""
          - toolchain: linux-musl
            name: Linux (musl)
            packages: musl-tools

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake ${{ matrix.packages }}

      - name: Configure (CMake)
        working-directory: ttp-primitives/c
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=toolchains/${{ matrix.toolchain }}.cmake

      - name: Build
        working-directory: ttp-primitives/c
        run: cmake --build build

      - name: Test
        working-directory: ttp-primitives/c/build
        run: ctest --output-on-failure

  windows:
    strategy:
      matrix:
        include:
          - toolchain: windows-msvc
            name: Windows (MSVC/UCRT)
          - toolchain: windows-mingw
            name: Windows (MinGW/MSVCRT)

    name: ${{ matrix.name }}
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - name: Configure (CMake)
        working-directory: ttp-primitives/c
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=toolchains/${{ matrix.toolchain }}.cmake

      - name: Build
        working-directory: ttp-primitives/c
        run: cmake --build build

      - name: Test
        working-directory: ttp-primitives/c/build
        run: ctest --output-on-failure
