name: Build C Primitives

on:
  push:
    branches: [main]
    paths:
      - 'ttp-primitives/c/**'
      - 'tools/**'
      - '.github/workflows/build-c.yml'
  pull_request:
    paths:
      - 'ttp-primitives/c/**'
      - 'tools/**'
      - '.github/workflows/build-c.yml'

jobs:
  linux:
    strategy:
      matrix:
        include:
          - toolchain: linux-glibc
            config: linux-c-glibc
            name: Linux (glibc)
            packages: ""
          - toolchain: linux-musl
            config: linux-c-musl
            name: Linux (musl)
            packages: musl-tools

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake git python3 ${{ matrix.packages }}

      - name: Configure (CMake)
        working-directory: ttp-primitives/c
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=toolchains/${{ matrix.toolchain }}.cmake

      - name: Build
        working-directory: ttp-primitives/c
        run: cmake --build build

      - name: Test
        working-directory: ttp-primitives/c/build
        run: ctest --output-on-failure

      # Stage the primitives on their own. The Catch2 harness is deliberately
      # not installed: it links the default glibc toolchain even in the musl
      # config, so it is not part of the substrate under measurement.
      - name: Stage primitives
        working-directory: ttp-primitives/c
        run: cmake --install build --prefix ../../dist/${{ matrix.config }}

      # Prove the artifacts actually have the runtime this config claims,
      # rather than trusting that the toolchain file took effect.
      - name: Verify substrate
        run: |
          python3 tools/verify_substrate.py \
            --config ${{ matrix.config }} \
            --json substrate-${{ matrix.config }}.json \
            dist/${{ matrix.config }}

      - name: Upload verified primitives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}
          path: |
            dist/${{ matrix.config }}
            substrate-${{ matrix.config }}.json

  windows-msvc:
    name: Windows (MSVC/UCRT)
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }
          ninja --version

      # vcvars64.bat only affects the environment of the shell that calls it, so
      # configure, build, and test all run inside this one cmd block. The install
      # path is discovered with vswhere rather than hardcoded, because the runner
      # image bumps its Visual Studio version over time.
      - name: Build and test (MSVC)
        shell: cmd
        working-directory: ttp-primitives/c
        run: |
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSPATH=%%i"
          if not defined VSPATH echo No Visual Studio C++ toolset found && exit /b 1
          echo Using Visual Studio at %VSPATH%
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat" || exit /b 1
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl || exit /b 1
          cmake --build build || exit /b 1
          ctest --test-dir build --output-on-failure || exit /b 1
          dumpbin /dependents build\empty\empty.exe

  windows-mingw:
    name: Windows (MinGW/MSVCRT)
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }
          ninja --version

      - name: Configure (CMake)
        working-directory: ttp-primitives/c
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++

      - name: Build
        working-directory: ttp-primitives/c
        run: cmake --build build

      - name: Test
        working-directory: ttp-primitives/c/build
        run: ctest --output-on-failure

      - name: Show CRT linkage
        working-directory: ttp-primitives/c
        run: objdump -p build/empty/empty.exe | Select-String "DLL Name"
