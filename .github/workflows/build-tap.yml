name: Build tap

# Build and test the telemetry analysis pipeline. tap is pure Go (no cgo) and
# cross-compiles for the lab hosts, so CI runs on ubuntu-latest and also verifies
# the Linux and Windows builds.

on:
  push:
    branches: [main]
    paths:
      - 'tap/**'
      - '.github/workflows/build-tap.yml'
  pull_request:
    paths:
      - 'tap/**'
      - '.github/workflows/build-tap.yml'

jobs:
  tap:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: tap/go.mod

      - name: Vet
        working-directory: tap
        run: go vet ./...

      - name: Test
        working-directory: tap
        run: go test ./...

      - name: Build release binaries (linux + windows)
        working-directory: tap
        run: |
          GOOS=linux   GOARCH=amd64 go build -trimpath -o dist/linux/tap    ./cmd/tap
          GOOS=windows GOARCH=amd64 go build -trimpath -o dist/windows/tap.exe ./cmd/tap

      - name: Upload tap binaries
        uses: actions/upload-artifact@v7
        with:
          name: tap
          path: tap/dist/
          if-no-files-found: error
