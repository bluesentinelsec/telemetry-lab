# Expected substrate for each build configuration.
#
# Expectations attach to the configuration, not the primitive: every primitive
# built under a given config must exhibit these facts, so one block covers all
# of them. Adding a platform means adding blocks here, not changing verifier
# code.
#
# Values were established empirically by building in the debian:trixie CI
# container and reading the resulting ELF headers -- not assumed.

[config.linux-c-glibc]
description = "Debian 13 C primitives against GNU libc"
os = "linux"
language = "c"
compiler = "gcc"
runtime = "glibc"

[config.linux-c-glibc.expect]
format = "elf"
machine = "x86-64"
linkage = "dynamic"
# glibc's dynamic loader. This single string is the decisive discriminator.
interpreter = "/lib64/ld-linux-x86-64.so.2"
# Assert the presence of glibc AND the absence of musl. Checking only the
# former would let a config that silently fell back to the wrong toolchain
# still pass.
needed = { includes = ["libc.so.6"], excludes = ["libc.so"] }
# Identifies the compiler, NOT the libc: musl-gcc wraps this same gcc and emits
# an identical string, so this can never distinguish glibc from musl.
comment = { matches = "^GCC: \\(Debian " }

[config.linux-c-musl]
description = "Debian 13 C primitives against musl libc"
os = "linux"
language = "c"
compiler = "musl-gcc"
runtime = "musl"

[config.linux-c-musl.expect]
format = "elf"
machine = "x86-64"
# musl-gcc on Debian links dynamically, not statically. The lab host therefore
# needs the musl runtime installed or these primitives will not launch.
linkage = "dynamic"
interpreter = "/lib/ld-musl-x86_64.so.1"
needed = { includes = ["libc.so"], excludes = ["libc.so.6"] }
comment = { matches = "^GCC: \\(Debian " }

# --- C++ (Linux) ---------------------------------------------------------
# Both C++ configs use clang++ and glibc; the only varying factor is the C++
# standard library. Each asserts the presence of its own C++ stdlib AND the
# absence of the other, so a build that selected the wrong one fails loudly.
# Established empirically by building in debian:trixie (Clang 19).

[config.linux-cpp-libstdcxx]
description = "Debian 13 C++ primitives against GNU libstdc++"
os = "linux"
language = "cpp"
compiler = "clang++"
runtime = "libstdc++"

[config.linux-cpp-libstdcxx.expect]
format = "elf"
machine = "x86-64"
linkage = "dynamic"
interpreter = "/lib64/ld-linux-x86-64.so.2"
# GNU C++ stdlib present, LLVM C++ stdlib absent; glibc underneath.
needed = { includes = ["libstdc++.so.6", "libc.so.6"], excludes = ["libc++.so.1"] }
# clang++ does not write a GCC .comment string; it identifies itself as clang.
comment = { matches = "clang" }

[config.linux-cpp-libcxx]
description = "Debian 13 C++ primitives against LLVM libc++"
os = "linux"
language = "cpp"
compiler = "clang++"
runtime = "libc++"

[config.linux-cpp-libcxx.expect]
format = "elf"
machine = "x86-64"
linkage = "dynamic"
interpreter = "/lib64/ld-linux-x86-64.so.2"
# LLVM C++ stdlib (and its ABI library) present, GNU C++ stdlib absent.
needed = { includes = ["libc++.so.1", "libc++abi.so.1", "libc.so.6"], excludes = ["libstdc++.so.6"] }
comment = { matches = "clang" }

# --- Go (Linux) ----------------------------------------------------------
# The Go axis is cgo on/off, which is a system-call-path swap rather than a
# library swap: CGO=1 links the system libc dynamically; CGO=0 is a pure-Go
# static binary with no libc and no loader. This is the first static config in
# the matrix, exercising the linkage="static" and interpreter absent rules.
#
# CONCESSION: a no-op Go primitive links no libc under either setting, so the
# empty primitive carries a blank `import _ "net"` to force the cgo split. See
# ttp-primitives/go/empty/main.go for the full rationale. Established
# empirically in debian:trixie (go 1.24).

[config.linux-go-cgo]
description = "Debian 13 Go primitives with cgo enabled (system libc)"
os = "linux"
language = "go"
compiler = "go build (CGO_ENABLED=1)"
runtime = "glibc"

[config.linux-go-cgo.expect]
format = "elf"
machine = "x86-64"
linkage = "dynamic"
interpreter = "/lib64/ld-linux-x86-64.so.2"
needed = { includes = ["libc.so.6"] }

[config.linux-go-static]
description = "Debian 13 Go primitives with cgo disabled (pure-Go static)"
os = "linux"
language = "go"
compiler = "go build (CGO_ENABLED=0)"
runtime = "pure-go"

[config.linux-go-static.expect]
format = "elf"
machine = "x86-64"
# Pure-Go: statically linked, no dynamic loader, no libc dependency.
linkage = "static"
interpreter = { absent = true }
needed = { excludes = ["libc.so.6"] }

# --- Rust (Linux) --------------------------------------------------------
# The Rust axis is the gnu vs musl target, i.e. the same glibc/musl runtime the
# C configs use, but one level up: Rust links its own std runtime on top of the
# libc. Both configs are STATICALLY linked (gnu via +crt-static, musl by
# default) so they differ only in the libc, mirroring how the C configs differ
# only in the libc while both dynamic.
#
# Because both are static, the libc does not appear in DT_NEEDED; the `libc`
# content-signature fact is what discriminates them. Established empirically in
# debian:trixie (rustc 1.97).
#
# CAVEAT: glibc discourages full static linking (NSS-backed calls such as DNS
# resolution can fail at runtime). Harmless for compute-only primitives like
# empty; revisit for network primitives. Record as a dissertation limitation.

[config.linux-rust-gnu]
description = "Debian 13 Rust primitives, gnu target, static glibc"
os = "linux"
language = "rust"
compiler = "rustc (x86_64-unknown-linux-gnu, +crt-static)"
runtime = "glibc"

[config.linux-rust-gnu.expect]
format = "elf"
machine = "x86-64"
linkage = "static"
interpreter = { absent = true }
# libc statically linked in, so it is absent from DT_NEEDED; the embedded
# content signature is the discriminator.
libc = "glibc"

[config.linux-rust-musl]
description = "Debian 13 Rust primitives, musl target, static musl"
os = "linux"
language = "rust"
compiler = "rustc (x86_64-unknown-linux-musl)"
runtime = "musl"

[config.linux-rust-musl.expect]
format = "elf"
machine = "x86-64"
linkage = "static"
interpreter = { absent = true }
libc = "musl"

# --- C (Windows) ---------------------------------------------------------
# The Windows C axis is the Windows analogue of glibc/musl: hold the compiler
# constant (MinGW gcc) and vary only the C runtime library, UCRT vs MSVCRT. Both
# configs build with gcc from MSYS2, differing only in the environment -- ucrt64
# (UCRT) vs mingw64 (MSVCRT) -- so the compiler is not confounded with the CRT.
#
# MSVC (cl.exe) is deliberately NOT used here: cl can only target UCRT, so an
# MSVC-vs-MinGW comparison would vary compiler and CRT together. Holding gcc
# constant keeps this a single-factor runtime-library contrast, consistent with
# every other cell in the matrix.
#
# The CRT is read from the PE import table: UCRT imports api-ms-win-crt-*.dll,
# MSVCRT imports msvcrt.dll. Each config asserts its own CRT and the absence of
# the other. Established empirically on windows-2025 (MSYS2 gcc).

[config.windows-c-ucrt]
description = "Windows 11 C primitives, MinGW gcc, UCRT"
os = "windows"
language = "c"
compiler = "gcc (MSYS2 ucrt64)"
runtime = "UCRT"

[config.windows-c-ucrt.expect]
format = "pe"
machine = "x86-64"
libc = "UCRT"
needed = { includes = ["api-ms-win-crt-runtime-l1-1-0.dll"], excludes = ["msvcrt.dll"] }

[config.windows-c-msvcrt]
description = "Windows 11 C primitives, MinGW gcc, MSVCRT"
os = "windows"
language = "c"
compiler = "gcc (MSYS2 mingw64)"
runtime = "MSVCRT"

[config.windows-c-msvcrt.expect]
format = "pe"
machine = "x86-64"
libc = "MSVCRT"
needed = { includes = ["msvcrt.dll"], excludes = ["api-ms-win-crt-runtime-l1-1-0.dll"] }

# --- C++ (Windows) -------------------------------------------------------
# The Windows C++ axis mirrors the Linux C++ axis: hold the compiler constant
# (clang++, from MSYS2 ucrt64) and vary only the C++ standard library, libstdc++
# vs libc++. BOTH configs link the same C runtime (UCRT), so the only varying
# factor is the C++ standard library -- not the compiler, not the C runtime.
# The stdlib is dynamically linked, so it appears in the PE import table:
# libstdc++ -> libstdc++-6.dll, libc++ -> libc++.dll. Each config asserts its
# own stdlib DLL and the absence of the other; libc=UCRT is asserted on both.
#
# CONCESSION: on Windows a no-op program links neither stdlib, so the `empty`
# primitive references std to force the import. See ttp-primitives/cpp/empty/
# main.cpp for the rationale. Established empirically on windows-2025 (MSYS2
# clang 22, ucrt64).

[config.windows-cpp-libstdcxx]
description = "Windows 11 C++ primitives, clang, GNU libstdc++ on UCRT"
os = "windows"
language = "cpp"
compiler = "clang++ (MSYS2 ucrt64)"
runtime = "libstdc++"

[config.windows-cpp-libstdcxx.expect]
format = "pe"
machine = "x86-64"
libc = "UCRT"
needed = { includes = ["libstdc++-6.dll"], excludes = ["libc++.dll"] }

[config.windows-cpp-libcxx]
description = "Windows 11 C++ primitives, clang, LLVM libc++ on UCRT"
os = "windows"
language = "cpp"
compiler = "clang++ (MSYS2 ucrt64)"
runtime = "libc++"

[config.windows-cpp-libcxx.expect]
format = "pe"
machine = "x86-64"
libc = "UCRT"
needed = { includes = ["libc++.dll"], excludes = ["libstdc++-6.dll"] }
