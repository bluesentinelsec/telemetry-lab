# Expected substrate for each build configuration.
#
# Expectations attach to the configuration, not the primitive: every primitive
# built under a given config must exhibit these facts, so one block covers all
# of them. Adding a platform means adding blocks here, not changing verifier
# code.
#
# Values were established empirically by building in the debian:trixie CI
# container and reading the resulting ELF headers -- not assumed.

[config.linux-c-glibc]
description = "Debian 13 C primitives against GNU libc"
os = "linux"
language = "c"
compiler = "gcc"
runtime = "glibc"

[config.linux-c-glibc.expect]
format = "elf"
machine = "x86-64"
linkage = "dynamic"
# glibc's dynamic loader. This single string is the decisive discriminator.
interpreter = "/lib64/ld-linux-x86-64.so.2"
# Assert the presence of glibc AND the absence of musl. Checking only the
# former would let a config that silently fell back to the wrong toolchain
# still pass.
needed = { includes = ["libc.so.6"], excludes = ["libc.so"] }
# Identifies the compiler, NOT the libc: musl-gcc wraps this same gcc and emits
# an identical string, so this can never distinguish glibc from musl.
comment = { matches = "^GCC: \\(Debian " }

[config.linux-c-musl]
description = "Debian 13 C primitives against musl libc"
os = "linux"
language = "c"
compiler = "musl-gcc"
runtime = "musl"

[config.linux-c-musl.expect]
format = "elf"
machine = "x86-64"
# musl-gcc on Debian links dynamically, not statically. The lab host therefore
# needs the musl runtime installed or these primitives will not launch.
linkage = "dynamic"
interpreter = "/lib/ld-musl-x86_64.so.1"
needed = { includes = ["libc.so"], excludes = ["libc.so.6"] }
comment = { matches = "^GCC: \\(Debian " }

# --- C++ (Linux) ---------------------------------------------------------
# Both C++ configs use clang++ and glibc; the only varying factor is the C++
# standard library. Each asserts the presence of its own C++ stdlib AND the
# absence of the other, so a build that selected the wrong one fails loudly.
# Established empirically by building in debian:trixie (Clang 19).

[config.linux-cpp-libstdcxx]
description = "Debian 13 C++ primitives against GNU libstdc++"
os = "linux"
language = "cpp"
compiler = "clang++"
runtime = "libstdc++"

[config.linux-cpp-libstdcxx.expect]
format = "elf"
machine = "x86-64"
linkage = "dynamic"
interpreter = "/lib64/ld-linux-x86-64.so.2"
# GNU C++ stdlib present, LLVM C++ stdlib absent; glibc underneath.
needed = { includes = ["libstdc++.so.6", "libc.so.6"], excludes = ["libc++.so.1"] }
# clang++ does not write a GCC .comment string; it identifies itself as clang.
comment = { matches = "clang" }

[config.linux-cpp-libcxx]
description = "Debian 13 C++ primitives against LLVM libc++"
os = "linux"
language = "cpp"
compiler = "clang++"
runtime = "libc++"

[config.linux-cpp-libcxx.expect]
format = "elf"
machine = "x86-64"
linkage = "dynamic"
interpreter = "/lib64/ld-linux-x86-64.so.2"
# LLVM C++ stdlib (and its ABI library) present, GNU C++ stdlib absent.
needed = { includes = ["libc++.so.1", "libc++abi.so.1", "libc.so.6"], excludes = ["libstdc++.so.6"] }
comment = { matches = "clang" }
